    };
  })();
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #ff5e87;
    font-family: "Fraunces", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow: hidden; overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    color: #1a0033;
  }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #root { width: 100%; height: 100%; position: relative; }

  /* ── TouchSelector animations (same as design canvas index) ── */
  @keyframes ts-spin { to { transform: rotate(360deg); } }
  @keyframes ts-breathe {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50% { transform: scale(1.12); opacity: 1; }
  }
  @keyframes ts-pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.5); opacity: 1; }
  }
  @keyframes ts-dot {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-4px); }
  }
  @keyframes ts-marker-in {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(2.2); }
    60% { opacity: 1; }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes ts-marker-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); }
  }
  @keyframes ts-hint-breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  @keyframes ts-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ts-banner-in {
    0% { opacity: 0; transform: scale(0.4) translateY(-20px); }
    60% { opacity: 1; transform: scale(1.1) translateY(0); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes ts-orbit {
    from { transform: rotate(0deg) translate(60px) rotate(0deg); }
    to { transform: rotate(360deg) translate(60px) rotate(-360deg); }
  }
  @keyframes ts-float {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-8px) rotate(4deg); }
  }
  @keyframes ts-burst-0  { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 8%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 200px)) scale(.8) rotate(var(--rot));} }
  @keyframes ts-burst-1  { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 10%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 240px)) scale(.7) rotate(var(--rot));} }
  @keyframes ts-burst-2  { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 8%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 220px)) scale(.9) rotate(var(--rot));} }
  @keyframes ts-burst-3  { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 12%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 260px)) scale(.6) rotate(var(--rot));} }
  @keyframes ts-burst-4  { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 8%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 280px)) scale(.85) rotate(var(--rot));} }
  @keyframes ts-burst-5  { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 10%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 210px)) scale(.75) rotate(var(--rot));} }
  @keyframes ts-burst-6  { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 8%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 250px)) scale(.9) rotate(var(--rot));} }
  @keyframes ts-burst-7  { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 11%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 230px)) scale(.7) rotate(var(--rot));} }
  @keyframes ts-burst-8  { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 9%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 270px)) scale(.8) rotate(var(--rot));} }
  @keyframes ts-burst-9  { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 10%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 220px)) scale(.85) rotate(var(--rot));} }
  @keyframes ts-burst-10 { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 8%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 290px)) scale(.7) rotate(var(--rot));} }
  @keyframes ts-burst-11 { 0%{opacity:0; transform:translate(-50%,-50%) scale(.2);} 12%{opacity:1;} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy) + 240px)) scale(.8) rotate(var(--rot));} }

  /* ── App chrome ── */
  @keyframes sheet-in {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes backdrop-in {
    from { opacity: 0; } to { opacity: 1; }
  }
</style>
</head>
<body>
<!-- Google Tag Manager (noscript) — harmless fallback; web views run JS so it's rarely used -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T44LWB3H"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="touch-selector.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const THEME_COLOR = {
  neon:   '#04000f',
  pop:    '#ff5e87',
  glass:  '#7eb3ff',
  kawaii: '#ffe4ec',
};

const THEME_PREVIEW_BG = {
  neon:   'linear-gradient(135deg, #0a0020 0%, #1a0b3d 100%)',
  pop:    'linear-gradient(140deg, #ff5e87 0%, #ff9a3d 50%, #ffd14a 100%)',
  glass:  'conic-gradient(from 200deg at 70% 30%, #ff7eb3, #ffd57e, #7eddff, #b67eff, #ff7eb3)',
  kawaii: 'radial-gradient(circle at 50% 0%, #ffe4ec 0%, #f0d9ff 55%, #d9efff 100%)',
};

const THEMES = [
  { id: 'pop',    name: 'POP Confetti',  sub: 'Vivid gradient · chunky rings' },
  { id: 'neon',   name: 'NEON Cyber',    sub: 'Dark · neon glow' },
  { id: 'glass',  name: 'AURORA Glass',  sub: 'Aurora · translucent' },
  { id: 'kawaii', name: 'KAWAII Sticker', sub: 'Pastel · cute faces' },
];

// ── Mini live preview swatch per theme (using accent colors) ──
function ThemeSwatch({ variant }) {
  const v = TS_VARIANTS[variant];
  return (
    <div style={{
      width: 56, height: 56, borderRadius: 14,
      background: THEME_PREVIEW_BG[variant],
      flexShrink: 0, position: 'relative', overflow: 'hidden',
      boxShadow: 'inset 0 0 0 1px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.12)',
    }}>
      {/* tiny rings to evoke the variant */}
      {[0, 1, 2].map(i => (
        <div key={i} style={{
          position: 'absolute',
          left: 8 + i * 16, top: 8 + (i % 2) * 24,
          width: 14, height: 14, borderRadius: '50%',
          background: v.colors[i],
          border: variant === 'kawaii' ? '1.5px solid #2a0a2a' : 'none',
          boxShadow: variant === 'neon' ? `0 0 6px ${v.colors[i]}` : '0 1px 2px rgba(0,0,0,.15)',
        }} />
      ))}
    </div>
  );
}

function SettingsButton({ onClick, variant }) {
  const isDark = variant === 'neon';
  return (
    <button
      aria-label="Settings"
      onPointerDown={(e) => e.stopPropagation()}
      onPointerUp={(e) => e.stopPropagation()}
      onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{
        position: 'fixed',
        top: 'calc(env(safe-area-inset-top) + 14px)',
        right: 14,
        width: 42, height: 42, borderRadius: '50%',
        border: 'none',
        background: isDark ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.35)',
        backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)',
        color: TS_VARIANTS[variant].fg,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        cursor: 'pointer', zIndex: 100,
        boxShadow: '0 2px 10px rgba(0,0,0,.12)',
      }}
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  );
}

function SettingsSheet({ variant, onChange, onClose, installPrompt, onInstall }) {
  return (
    <>
      <div
        onClick={onClose}
        style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,.45)',
          zIndex: 200, animation: 'backdrop-in .25s ease',
        }}
      />
      <div
        onPointerDown={(e) => e.stopPropagation()}
        style={{
          position: 'fixed', left: 0, right: 0, bottom: 0,
          background: '#fff',
          borderTopLeftRadius: 28, borderTopRightRadius: 28,
          padding: '14px 20px calc(env(safe-area-inset-bottom) + 28px)',
          zIndex: 201,
          animation: 'sheet-in .32s cubic-bezier(.2,.8,.3,1)',
          maxHeight: '85vh', overflowY: 'auto',
          fontFamily: '"Fraunces", system-ui, sans-serif',
          color: '#1a0033',
          boxShadow: '0 -20px 60px rgba(0,0,0,.3)',
        }}
      >
        {/* drag handle */}
        <div style={{
          width: 44, height: 5, borderRadius: 3, background: '#0001',
          margin: '0 auto 18px',
        }} />

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 22 }}>
          <h2 style={{ margin: 0, fontSize: 26, fontWeight: 800, letterSpacing: -0.5 }}>Settings</h2>
          <button onClick={onClose} style={{
            background: 'transparent', border: 'none', color: '#1a0033',
            fontSize: 14, fontWeight: 600, cursor: 'pointer', padding: '6px 4px',
          }}>Close</button>
        </div>

        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 12, letterSpacing: 2, opacity: 0.55, textTransform: 'uppercase',
            fontFamily: '"JetBrains Mono", monospace', marginBottom: 12 }}>THEME</div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {THEMES.map(t => {
              const active = t.id === variant;
              return (
                <button
                  key={t.id}
                  onClick={() => { onChange(t.id); try { navigator.vibrate && navigator.vibrate(12); } catch {} }}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 14,
                    padding: '12px 14px',
                    background: active ? '#fff5ea' : '#fafaf7',
                    border: active ? '2px solid #ff5e87' : '2px solid transparent',
                    borderRadius: 18,
                    cursor: 'pointer', textAlign: 'left', width: '100%',
                    transition: 'background .15s, border-color .15s, transform .1s',
                    fontFamily: 'inherit', color: 'inherit',
                  }}
                >
                  <ThemeSwatch variant={t.id} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: -0.2 }}>{t.name}</div>
                    <div style={{ fontSize: 13, opacity: 0.6, marginTop: 2 }}>{t.sub}</div>
                  </div>
                  <div style={{
                    width: 24, height: 24, borderRadius: '50%',
                    background: active ? '#ff5e87' : 'transparent',
                    border: active ? 'none' : '2px solid #0002',
                    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                  }}>
                    {active && (
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff"
                        strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                    )}
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        {installPrompt && (
          <button onClick={onInstall} style={{
            width: '100%', padding: '14px 18px',
            background: 'linear-gradient(140deg, #ff5e87 0%, #ff9a3d 100%)',
            color: '#fff', border: 'none', borderRadius: 18,
            fontSize: 16, fontWeight: 800, fontFamily: 'inherit',
            cursor: 'pointer', marginBottom: 14,
            boxShadow: '0 6px 18px rgba(255,94,135,.45)',
            letterSpacing: -0.2,
          }}>📲 Add to Home Screen</button>
        )}

        <div style={{ fontSize: 11, opacity: 0.45, textAlign: 'center', marginTop: 10,
          fontFamily: '"JetBrains Mono", monospace', letterSpacing: 1 }}>
          Coffigo · v1.0
        </div>
      </div>
    </>
  );
}

function App() {
  const [variant, setVariant] = useState(() => {
    try { return localStorage.getItem('coffigo.variant') || 'pop'; }
    catch { return 'pop'; }
  });
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [installPrompt, setInstallPrompt] = useState(null);
  const wakeLockRef = useRef(null);

  // Persist + sync theme-color meta
  useEffect(() => {
    try { localStorage.setItem('coffigo.variant', variant); } catch {}
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = THEME_COLOR[variant];
    document.body.style.background = THEME_COLOR[variant];
  }, [variant]);

  // Install prompt
  useEffect(() => {
    const onPrompt = (e) => { e.preventDefault(); setInstallPrompt(e); };
    window.addEventListener('beforeinstallprompt', onPrompt);
    return () => window.removeEventListener('beforeinstallprompt', onPrompt);
  }, []);

  // Wake lock — keep screen on while app is in foreground
  useEffect(() => {
    let cancelled = false;
    async function acquire() {
      if (!('wakeLock' in navigator)) return;
      try {
        const lock = await navigator.wakeLock.request('screen');
        if (cancelled) { lock.release(); return; }
        wakeLockRef.current = lock;
      } catch {}
    }
    const onVisible = () => {
      if (document.visibilityState === 'visible') acquire();
    };
    acquire();
    document.addEventListener('visibilitychange', onVisible);
    return () => {
      cancelled = true;
      document.removeEventListener('visibilitychange', onVisible);
      if (wakeLockRef.current) { try { wakeLockRef.current.release(); } catch {} }
    };
  }, []);

  const triggerInstall = async () => {
    if (!installPrompt) return;
    installPrompt.prompt();
    try { await installPrompt.userChoice; } catch {}
    setInstallPrompt(null);
    setSettingsOpen(false);
  };

  return (
    <>
      {/* key={variant} forces a fresh game when theme changes */}
      <TouchSelector key={variant} variant={variant} />
      <SettingsButton variant={variant} onClick={() => setSettingsOpen(true)} />
      {settingsOpen && (
        <SettingsSheet
          variant={variant}
          onChange={setVariant}
          onClose={() => setSettingsOpen(false)}
          installPrompt={installPrompt}
          onInstall={triggerInstall}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Register service worker (best-effort, off the critical path).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
