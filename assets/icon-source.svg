<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="popbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5e87"></stop>
      <stop offset="50%" stop-color="#ff9a3d"></stop>
      <stop offset="100%" stop-color="#ffd14a"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".4"></stop>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="bokeh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".5"></stop>
      <stop offset="60%" stop-color="#fff" stop-opacity=".12"></stop>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#popbg)"></rect>

  <circle cx="780" cy="280" r="280" fill="url(#bokeh)"></circle>
  <circle cx="240" cy="760" r="220" fill="url(#bokeh)"></circle>

  <circle cx="512" cy="512" r="360" fill="url(#glow)"></circle>

  <circle cx="512" cy="512" r="200" fill="none" stroke="#fff" stroke-width="62"></circle>

  <ellipse cx="512" cy="752" rx="180" ry="18" fill="#000" opacity=".12"></ellipse>

  <circle cx="512" cy="512" r="98" fill="#ff2e63"></circle>
  <circle cx="488" cy="488" r="24" fill="#fff" opacity=".55"></circle>
</svg>
